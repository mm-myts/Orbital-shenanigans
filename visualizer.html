<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hohmann Transfer Visualizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>HOHMANN TRANSFER VISUALIZER</h1>
  <span>orbital mechanics visualizer</span>
</header>

<div class="layout">

  <aside class="sidebar">

    <div class="input-group">
      <label>Initial altitude</label>
      <div class="input-wrap">
        <input type="number" id="alt1" min="100" step="1" placeholder="e.g. 329">
        <span class="unit">km</span>
      </div>
    </div>

    <div class="input-group">
      <label>Target altitude</label>
      <div class="input-wrap">
        <input type="number" id="alt2"  min="100" step="1" placeholder="e.g. 35793">
        <span class="unit">km</span>
      </div>
    </div>


    <div class="error" id="error-msg"></div>

    <button class="button" id="run-btn" onclick="run()">Compute &amp; Plot</button>

    <div class="divider"></div>

    <div>
      <div class="stats-title">Results</div>
      <div class="stats" id="stats">
        <div class="stat-row"><span class="s-label">v₁</span><span class="s-val blue" id="s-v1">—</span></div>
        <div class="stat-row"><span class="s-label">v₂</span><span class="s-val green" id="s-v2">—</span></div>
        <div class="stat-row"><span class="s-label">Δv₁</span><span class="s-val red" id="s-dv1">—</span></div>
        <div class="stat-row"><span class="s-label">Δv₂</span><span class="s-val red" id="s-dv2">—</span></div>
        <div class="stat-row"><span class="s-label">Total Δv</span><span class="s-val orange" id="s-dvt">—</span></div>
        <div class="stat-row"><span class="s-label">Transfer time</span><span class="s-val" id="s-tt">—</span></div>
      </div>
    </div>

  </aside>

  <div class="charts">
    <div class="chart-wrap" id="geo-wrap">
      <div class="placeholder" id="geo-placeholder">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="10" stroke="#4a9eff" stroke-width="1.5"/>
          <ellipse cx="24" cy="24" rx="22" ry="22" stroke="#3ecf8e" stroke-width="1.5"/>
          <path d="M24 2 Q38 24 24 46" stroke="#ff7c3a" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
        </svg>
        <span>Enter altitudes and click Compute</span>
      </div>
      <div class="plotly-chart" id="geo-chart"></div>
    </div>
    <div class="chart-wrap" id="vt-wrap">
      <div class="placeholder" id="vt-placeholder">
        <svg width="48" height="32" viewBox="0 0 48 32" fill="none">
          <path d="M2 20 L12 20 L12 8 Q28 8 36 24 L36 24 L36 14 L46 14" stroke="#888" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
        <span>v(t) will appear here</span>
      </div>
      <div class="plotly-chart" id="vt-chart"></div>
    </div>
  </div>

</div>

<script src="./scriptVis.js" defer></script>   
</body>
</html>
