<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hohmann Transfer Visualizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>FUEL CONSUMPTION CALCULATOR</h1>
  <span>fuel necessary for a mission</span>
</header>

<div class="layout">

  <aside class="sidebar">

    <div class="input-group">
      <label>Initial altitude</label>
      <div class="input-wrap">
        <input type="number" id="alt1" min="100" value="329" step="1" placeholder="e.g. 329">
        <span class="unit">km</span>
      </div>
    </div>

    <div class="input-group">
      <label>Target altitude</label>
      <div class="input-wrap">
        <input type="number" id="alt2" min="100" value="35793" step="1" placeholder="e.g. 35793">
        <span class="unit">km</span>
      </div>
    </div>

    <div class="input-group">
      <label>Spacecraft mass</label>
      <div class="input-wrap">
        <input type="number" id="mass" min="1" value="1000" step="1" placeholder="e.g. 1000">
        <span class="unit">kg</span>
      </div>
    </div>

    <div class="input-group">
      <label>Exhaust velocity of the engine</label>
      <div class="input-wrap">
        <input type="number" id="ve" min="100" value="4500" step="1" placeholder="e.g. 4500">
        <span class="unit">m/s</span>
      </div>
    </div>

    <div class="error" id="error-msg"></div>

    <button class="button" id="run-btn" onclick="run()">Compute &amp; Plot</button>

    <div class="divider"></div>

    <div>
      <div class="section-label">Results</div>
      <br>
      <div class="stats">
        <div class="stat-row"><span class="s-label">Δv₁</span><span class="s-val red"    id="s-dv1">—</span></div>
        <div class="stat-row"><span class="s-label">Δv₂</span><span class="s-val red"    id="s-dv2">—</span></div>
        <div class="stat-row"><span class="s-label">Total Δv</span><span class="s-val orange" id="s-dvt">—</span></div>
        <div class="stat-row"><span class="s-label">Transfer time</span><span class="s-val" id="s-tt">—</span></div>
        <div class="divider" style="margin:4px 0"></div>
        <div class="stat-row"><span class="s-label">Fuel burn 1</span><span class="s-val blue"   id="s-f1">—</span></div>
        <div class="stat-row"><span class="s-label">Fuel burn 2</span><span class="s-val green"  id="s-f2">—</span></div>
        <div class="stat-row"><span class="s-label">Total fuel</span><span class="s-val purple" id="s-ft">—</span></div>
        <div class="stat-row"><span class="s-label">Initial wet mass</span><span class="s-val" id="s-mw">—</span></div>
      </div>

  </aside>

 <div class="charts">
    <div class="chart-wrap">
      <div class="placeholder" id="dv-placeholder">
        <svg width="48" height="32" viewBox="0 0 48 32" fill="none">
          <path d="M2 20 L12 20 L12 8 Q28 8 36 24 L36 24 L36 14 L46 14"
                stroke="#888" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
        <span>v(t) will appear here</span>
      </div>
      <div class="plotly-chart" id="dv-chart"></div>
    </div>
    <div class="chart-wrap">
      <div class="placeholder" id="fuel-placeholder">
        <svg width="48" height="32" viewBox="0 0 48 32" fill="none">
          <path d="M2 28 L2 28 L16 28 L16 16 L16 16 L30 16 L30 6 L46 6"
                stroke="#888" stroke-width="1.5" fill="none" stroke-linecap="round"
                stroke-linejoin="round"/>
        </svg>
        <span>Fuel graph will appear here</span>
      </div>
      <div class="plotly-chart" id="fuel-chart"></div>
    </div>
  </div>

</div>

<script src="src/scriptFuel.js" defer></script>   
</body>
</html>
